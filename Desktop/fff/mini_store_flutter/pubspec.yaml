name: mini_store
description: تطبيق متجر إلكتروني صغير مع Flutter
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  google_fonts: ^6.3.0
  sqflite: ^2.2.0+3
  path: ^1.8.0
  http: ^1.1.0
  shared_preferences: ^2.1.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  intl: ^0.20.2
  uuid: ^4.5.3
  cached_network_image: ^3.2.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
